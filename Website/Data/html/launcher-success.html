<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amethyst.dev/launcherauthv2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Bricolage Grotesque', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0c0a09;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: linear-gradient(to bottom, #0c0a09, #292524);
    border: 1px solid #292524;
    border-radius: 8px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    text-align: center;
    max-width: 360px;
    width: 100%;
  }
  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 3px solid #9294FF;
    object-fit: cover;
    box-shadow: 0 0 20px rgba(146,148,255,0.3);
  }
  .greeting {
    color: #f5f5f4;
    font-size: 1.5rem;
    font-weight: 700;
  }
  .subtext {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 4px;
    padding: 0.75rem;
    color: #d4d4d8;
    font-size: 0.75rem;
    font-weight: 700;
    width: 100%;
  }
  .btn {
    width: 100%;
    height: 2.5rem;
    border: none;
    border-radius: 4px;
    font-weight: 700;
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-primary {
    background: #9294FF;
    color: #fff;
  }
  .btn-primary:hover {
    opacity: 0.9;
  }
  .btn-disabled {
    background: #52525b;
    color: #a1a1aa;
    cursor: default;
  }
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <img id="avatar" class="avatar" src="" alt="Avatar" />
  <h1 class="greeting">Welcome, <span id="username"></span></h1>
  <p class="subtext">Click Login to open the launcher and authenticate</p>
  <button id="loginBtn" class="btn btn-primary">Login</button>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const username = params.get('username');
  const avatar = params.get('avatar');

  document.getElementById('avatar').src = avatar || 'https://cdn.discordapp.com/embed/avatars/0.png';
  document.getElementById('username').textContent = username || 'User';

  const btn = document.getElementById('loginBtn');
  let clicked = false;

  btn.addEventListener('click', async () => {
    if (clicked) return;
    clicked = true;

    btn.innerHTML = '<span class="spinner"></span> Opening launcher...';
    btn.className = 'btn btn-disabled';

    try {
      if (token) {
        await fetch('/launcher/approve?token=' + encodeURIComponent(token));
      }
    } catch (e) {
      console.error('Approve failed:', e);
    }

    setTimeout(() => {
      btn.textContent = 'Logged In successfully!';
      btn.className = 'btn btn-disabled';
    }, 1500);
  });
</script>
</body>
</html>
